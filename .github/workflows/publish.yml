name: Publish to PyPI

on:
  release:
    types: [published]          # triggers on GitHub Release publish
  push:
    tags:
      - "v*"                    # triggers on any tag like v0.1.0, v1.0.0
  workflow_dispatch:            # allows manual trigger from GitHub Actions UI
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: false

permissions:
  id-token: write               # Required for OIDC trusted publisher

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist
        env:
          # Build for Python 3.8 through 3.13
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit and musl builds
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          # On Linux, link OpenSSL from the manylinux image
          CIBW_BEFORE_BUILD_LINUX: "yum install -y openssl-devel || apk add openssl-dev"
          # On macOS, install OpenSSL via brew
          CIBW_BEFORE_BUILD_MACOS: "brew install openssl || true"
          CIBW_ENVIRONMENT_MACOS: "LDFLAGS='-L/usr/local/opt/openssl/lib' CPPFLAGS='-I/usr/local/opt/openssl/include'"
          # Test after build
          CIBW_TEST_COMMAND: "python -c \"import cipheron; print('Backend:', cipheron.get_backend())\""

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tools
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cipheron/

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Show dist contents
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC trusted publisher
